<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR FAQ Chatbot</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .message { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .bot-msg { background: #e4e6eb; color: black; align-self: flex-start; }
        .user-msg { background: #0084ff; color: white; align-self: flex-end; }
        .input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chat-box">
        <div class="message bot-msg">Hello! Mag-type lang para makita ang mga FAQ suggestions.</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" list="faq-options" placeholder="Type a question..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <datalist id="faq-options">
            <option value="What is the Code of Discipline?">
            <option value="How to file a leave?">
            <option value="What is the dress code?">
            <option value="Late and Tardiness policy?">
            <option value="Overtime pay rules?">
            <option value="Payroll schedule?">
            <option value="Health insurance benefits?">
            <option value="Resignation process?">
            <option value="Performance evaluation?">
            <option value="Maternity/Paternity leave?">
            <option value="Emergency contact update?">
            <option value="Office hours?">
            <option value="Holiday pay?">
        </datalist>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // I-match ang value dito sa nasa datalist sa itaas
    const faqs = {
        "what is the code of discipline?": "The Code of Discipline is the standard of conduct for all employees.",
        "how to file a leave?": "Submit your leave form via the HR portal 3 days before the date.",
        "what is the dress code?": "Mon-Thu is Business Casual, Friday is Wash Day.",
        "late and tardiness policy?": "Three lates in a month may result in a verbal warning.",
        "overtime pay rules?": "OT must be pre-approved by your supervisor.",
        "payroll schedule?": "Salaries are released every 15th and 30th of the month.",
        "health insurance benefits?": "HMO coverage starts after the 6th month of employment.",
        "resignation process?": "A 30-day notice period is required for all resignations.",
        "performance evaluation?": "Evaluations are conducted every 6 months.",
        "maternity/paternity leave?": "Please submit your SBR requirements 2 months in advance.",
        "emergency contact update?": "Update your 201 file at the HR office.",
        "office hours?": "Regular office hours are from 8:00 AM to 5:00 PM.",
        "holiday pay?": "Holiday pay follows the standard DOLE regulations."
    };

    function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const rawInput = inputField.value.trim();
        const userInput = rawInput.toLowerCase();

        if (userInput === "") return;

        // Display User Message
        chatBox.innerHTML += `<div class="message user-msg">${rawInput}</div>`;

        // Bot Logic
        let botResponse = "Please contact Ms. Jhane Bellita for some HR concern.";
        
        // Eksaktong paghahanap sa FAQ keys
        if (faqs[userInput]) {
            botResponse = faqs[userInput];
        }

        // Display Bot Response
        setTimeout(() => {
            chatBox.innerHTML += `<div class="message bot-msg">${botResponse}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 300);

        inputField.value = "";
    }
</script>

</body>
</html>
